<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContaMais - Estoque Nuvem</title>
    <style>
        :root {
            --primary: #b72929;        
            --primary-hover: #8b1616;
            --bg-body: #fbeee3;        
            --bg-sidebar: #280606;     
            --bg-sidebar-active: #3d0a0a; /* Tom um pouco mais claro para o botão ativo */
            --card-bg: #ffffff;
            --text-main: #280606;      
            --text-sidebar: #fbeee3;
            --border-color: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: var(--bg-body); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        
        /* SIDEBAR */
        aside { 
            width: 260px; background: var(--bg-sidebar); color: var(--text-sidebar); 
            padding: 2rem 1rem; position: fixed; height: 100vh; z-index: 10; 
        }
        aside h2 { font-size: 1.5rem; margin-bottom: 2rem; text-align: center; color: var(--primary); text-transform: uppercase; }
        
        .nav-btn {
            width: 100%; padding: 0.8rem 1rem; background: transparent; border: none;
            color: var(--text-sidebar); text-align: left; cursor: pointer; border-radius: 8px;
            margin-bottom: 0.5rem; font-size: 1rem; transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }
        
        /* Efeito de destaque no botão ativo */
        .nav-btn.active { 
            background: var(--bg-sidebar-active); 
            border-left: 4px solid var(--primary);
            color: white; 
            font-weight: 600;
        }
        .nav-btn:hover { background: var(--primary); color: white; }

        /* MAIN CONTENT */
        main { margin-left: 260px; padding: 2rem; width: 100%; position: relative; }
        h1 { margin-bottom: 1.5rem; color: var(--bg-sidebar); }

        .section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* BOTÃO FLUTUANTE (FAB) CENTRALIZADO */
        .fab-container {
            position: fixed; bottom: 30px; left: 30px; z-index: 100;
            display: flex; flex-direction: column-reverse; align-items: center; gap: 15px;
        }
        .fab-main {
            width: 60px; height: 60px; background: var(--primary); color: white;
            border-radius: 50%; border: none; font-size: 35px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(183, 41, 41, 0.4); transition: 0.4s;
            /* Centralização perfeita do + */
            display: flex; align-items: center; justify-content: center;
            line-height: 0;
            padding-bottom: 5px; /* Ajuste fino para a cruz do + parecer centralizada a olho */
        }
        .fab-main.active { transform: rotate(45deg); background: var(--bg-sidebar); }

        .fab-options {
            display: none; flex-direction: column; gap: 10px; animation: slideUp 0.3s ease;
        }
        .fab-options.active { display: flex; }
        .fab-item {
            background: var(--card-bg); color: var(--text-main); border: 1px solid var(--primary);
            padding: 10px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap;
            font-weight: 600; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s;
        }

        /* GRID HOME */
        .grid-home { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem; }
        .card-menu {
            background: var(--card-bg); padding: 3rem; border-radius: 15px;
            text-align: center; cursor: pointer; transition: 0.3s; border: 2px solid transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .card-menu:hover { border-color: var(--primary); transform: translateY(-5px); }

        /* TABELAS */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th { background: #fffaf7; padding: 1rem; text-align: left; border-bottom: 2px solid var(--border-color); }
        td { padding: 1rem; border-bottom: 1px solid var(--border-color); }

        @media (max-width: 768px) {
            aside { width: 70px; padding: 1rem 0.5rem; }
            aside h2, .nav-btn span { display: none; }
            main { margin-left: 70px; padding: 1rem; }
            .grid-home { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <aside>
        <h2>ContaMais</h2>
        <nav id="sidebar-nav">
            <button class="nav-btn active" onclick="navegar('inicio')">🏠 <span>Início</span></button>
            <button class="nav-btn" onclick="navegar('areas-lista')">📍 <span>Áreas</span></button>
            <button class="nav-btn" onclick="navegar('produtos-lista')">🍾 <span>Produtos</span></button>
        </nav>
    </aside>

    <main>
        <!-- BOTÃO FLUTUANTE -->
        <div class="fab-container">
            <button class="fab-main" id="fabMain" onclick="toggleFab()">+</button>
            <div class="fab-options" id="fabOptions">
                <div class="fab-item" onclick="abrirCadastro('nova-area')">🏢 Nova Área</div>
                <div class="fab-item" onclick="abrirCadastro('novo-produto')">📦 Novo Produto</div>
            </div>
        </div>

        <!-- SEÇÕES DO SITE -->
        <section id="inicio" class="section active">
            <h1>Bem-vindo ao ContaMais</h1>
            <div class="grid-home">
                <div class="card-menu" onclick="navegar('areas-lista')">
                    <i style="font-size: 3rem; display: block; margin-bottom: 1rem;">📍</i>
                    <h2>Áreas</h2>
                    <p>Ver estoque por local</p>
                </div>
                <div class="card-menu" onclick="navegar('produtos-lista')">
                    <i style="font-size: 3rem; display: block; margin-bottom: 1rem;">🍾</i>
                    <h2>Produtos</h2>
                    <p>Ver estoque total</p>
                </div>
            </div>
        </section>

        <!-- LISTA DE ÁREAS -->
        <section id="areas-lista" class="section">
            <h1>Áreas de Estoque</h1>
            <div id="grid-areas" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem;"></div>
        </section>

        <!-- LISTA DE PRODUTOS -->
        <section id="produtos-lista" class="section">
            <h1>Estoque Geral</h1>
            <table>
                <thead><tr><th>Produto</th><th>Total</th></tr></thead>
                <tbody id="tabela-geral"></tbody>
            </table>
        </section>

        <!-- FORMULÁRIOS DE CADASTRO -->
        <section id="nova-area" class="section">
            <h1>Cadastrar Nova Área</h1>
            <div style="background: white; padding: 2rem; border-radius: 12px; max-width: 500px;">
                <input type="text" id="area-nome" placeholder="Ex: Salão Central" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem;">
                <button onclick="salvarArea()" style="background: var(--primary); color: white; border: none; width: 100%; padding: 1rem; border-radius: 8px; cursor: pointer;">Criar Área</button>
            </div>
        </section>

        <section id="novo-produto" class="section">
            <h1>Cadastrar Novo Produto</h1>
            <div style="background: white; padding: 2rem; border-radius: 12px; max-width: 500px;">
                <input type="text" id="prod-nome" placeholder="Ex: Heineken" style="width: 100%; padding: 0.8rem; margin-bottom: 1rem;">
                <div id="checks-areas" style="background: #fffaf7; padding: 1rem; border-radius: 8px; margin-bottom: 1rem;"></div>
                <button onclick="salvarProduto()" style="background: var(--primary); color: white; border: none; width: 100%; padding: 1rem; border-radius: 8px; cursor: pointer;">Salvar Produto</button>
            </div>
        </section>

        <!-- DETALHE DA ÁREA -->
        <section id="detalhe-area" class="section">
            <button onclick="navegar('areas-lista')" style="margin-bottom: 1rem; padding: 8px; cursor: pointer;">← Voltar</button>
            <h1 id="titulo-area">Área: <span></span></h1>
            <table>
                <thead><tr><th>Produto</th><th>Quantidade</th></tr></thead>
                <tbody id="tabela-area-itens"></tbody>
            </table>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC3cAzrTMwCUxDcMvl68XxrcGLkmeANtSg",
            authDomain: "contamais-411llp.firebaseapp.com",
            databaseURL: "https://contamais-411llp-default-rtdb.firebaseio.com",
            projectId: "contamais-411llp",
            storageBucket: "contamais-411llp.firebasestorage.app",
            messagingSenderId: "691691378209",
            appId: "1:691691378209:web:6191b84e88ee3281b17560"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let areasLocais = [];
        let produtosLocais = {};

        db.ref('areas').on('value', s => { 
            areasLocais = s.val() ? Object.values(s.val()) : []; 
            renderizarAreas(); 
        });
        db.ref('produtos').on('value', s => { 
            produtosLocais = s.val() || {}; 
            renderizarProdutosGeral(); 
        });

        function toggleFab() {
            document.getElementById('fabMain').classList.toggle('active');
            document.getElementById('fabOptions').classList.toggle('active');
        }

        // Função de navegação atualizada para destacar o menu
        function navegar(id) {
            // Esconde todas as seções
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            // Mostra a seção clicada
            document.getElementById(id).classList.add('active');
            
            // Gerencia o destaque na sidebar
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            // Tenta marcar o botão correspondente (mesmo que venha do Card ou FAB)
            if(id === 'inicio') document.querySelector('button[onclick*="inicio"]').classList.add('active');
            if(id === 'areas-lista' || id === 'detalhe-area') document.querySelector('button[onclick*="areas-lista"]').classList.add('active');
            if(id === 'produtos-lista') document.querySelector('button[onclick*="produtos-lista"]').classList.add('active');

            // Fecha o FAB
            document.getElementById('fabMain').classList.remove('active');
            document.getElementById('fabOptions').classList.remove('active');
        }

        function abrirCadastro(id) {
            if(id === 'novo-produto') renderizarChecks();
            navegar(id);
        }

        function renderizarAreas() {
            const container = document.getElementById('grid-areas');
            container.innerHTML = areasLocais.map(a => `<div onclick="verArea('${a}')" style="background: white; padding: 1.5rem; border-radius: 12px; text-align: center; cursor: pointer; border-top: 4px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05);">${a}</div>`).join('');
        }

        function renderizarProdutosGeral() {
            const tbody = document.getElementById('tabela-geral');
            tbody.innerHTML = Object.keys(produtosLocais).map(key => `<tr><td>${produtosLocais[key].nome}</td><td>${produtosLocais[key].qtd || 0}</td></tr>`).join('');
        }

        function renderizarChecks() {
            const container = document.getElementById('checks-areas');
            container.innerHTML = areasLocais.map(a => `<label style="display:block; margin: 5px 0;"><input type="checkbox" value="${a}"> ${a}</label>`).join('');
        }

        function salvarArea() {
            const n = document.getElementById('area-nome').value;
            if(n) { db.ref('areas').push(n); document.getElementById('area-nome').value = ''; navegar('areas-lista'); }
        }

        function salvarProduto() {
            const n = document.getElementById('prod-nome').value;
            const s = Array.from(document.querySelectorAll('#checks-areas input:checked')).map(i => i.value);
            if(n && s.length > 0) { db.ref('produtos').push({nome: n, locais: s, qtd: 0}); document.getElementById('prod-nome').value = ''; navegar('produtos-lista'); }
        }

        function verArea(nome) {
            navegar('detalhe-area');
            document.querySelector('#titulo-area span').innerText = nome;
            const tbody = document.getElementById('tabela-area-itens');
            tbody.innerHTML = Object.keys(produtosLocais).map(key => {
                const p = produtosLocais[key];
                if(p.locais && p.locais.includes(nome)) {
                    return `<tr><td>${p.nome}</td><td><input type="number" value="${p.qtd}" onchange="atualizar('${key}', this.value)" style="width: 60px; padding: 5px;"></td></tr>`;
                }
                return '';
            }).join('');
        }

        function atualizar(id, qtd) { db.ref('produtos/'+id).update({qtd: qtd}); }
    </script>
</body>
</html>
